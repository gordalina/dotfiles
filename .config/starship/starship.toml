command_timeout = 1000
format = """
${custom.arch}\
${custom.kubernetes}\
$all
"""

[aws]
disabled = true

[directory]
format = "in [$path]($style)[$read_only]($read_only_style) "

[docker_context]
disabled = true

[gcloud]
disabled = true

[custom.gcloud]
command = '''sed -n 's/^project = //p' ~/.config/gcloud/configurations/config_$(cat ~/.config/gcloud/active_config 2>/dev/null)'''
format = 'on [$output](bright-blue bold) '
when = '''p="$(sed -n 's/^project = //p' ~/.config/gcloud/configurations/config_$(cat ~/.config/gcloud/active_config 2>/dev/null))"; test -n "$p" -a "$p" != "gordalina"'''

[git_branch]
symbol = ""

[kubernetes]
disabled = true

[custom.kubernetes]
# Read current-context from the kubeconfig file instead of forking `kubectl`.
command = '''sed -n 's/^current-context: //p' "${KUBECONFIG:-$HOME/.kube/config}"'''
format = "[$output](green bold) "
when = '''c="$(sed -n 's/^current-context: //p' "${KUBECONFIG:-$HOME/.kube/config}")"; test -n "$c" -a "$c" != "kind"'''

[status]
disabled = false

[terraform]
format = "via [$workspace]($style) "

[custom.arch]
command = "uname -m"
format = "[$output](red) "
when = '''test "$(uname -m)" = "x86_64"'''

[elixir]
symbol = ''

[nodejs]
symbol = ''